<!DOCTYPE html>
<html>

<head>
    <title>HTML Videos and Audios</title>
</head>

<body>

    <h1>HTML Video and Audio</h1>

    <h2>Video Example</h2>
    <video width="250" controls>
        <source src="videoplayback.mp4" type="video/mp4">
        Your browser does not support video.
    </video>

    <h2>Audio Example</h2>
    <audio controls>
        <source src="bosniya.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>


</body>

</html>
